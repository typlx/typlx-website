default:
  tags:
    - kuber

include:
  - template: Auto-DevOps.gitlab-ci.yml

test:
  stage: test
  script:
    - echo "Verifying static site files..."
    - |
      failed=0
      for f in index.html privacy.html 404.html css/style.css css/blog.css js/main.js robots.txt sitemap.xml; do
        if [ -f "$f" ] && [ -s "$f" ]; then
          echo "OK $f"
        else
          echo "FAIL $f (missing or empty)"
          failed=1
        fi
      done
      for f in blog/*.html; do
        if [ -f "$f" ] && [ -s "$f" ]; then
          echo "OK $f"
        else
          echo "FAIL $f (missing or empty)"
          failed=1
        fi
      done
      if [ "$failed" -ne 0 ]; then
        echo "FAILED: some deployed files are missing or empty"
        exit 1
      fi
      echo "All deployed files verified."

production:
  stage: production
  image: registry.gitlab.com/gitlab-org/cluster-integration/auto-deploy-image:v2.135.0
  environment:
    name: production
    url: http://typlx.com
  script:
    - auto-deploy check_kube_domain
    - auto-deploy download_chart
    - auto-deploy use_kube_context || true
    - auto-deploy ensure_namespace
    - auto-deploy initialize_tiller
    - auto-deploy create_secret
    - auto-deploy deploy
    - auto-deploy delete canary
    - auto-deploy persist_environment_url
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

staging:
  stage: production
  image: registry.gitlab.com/gitlab-org/cluster-integration/auto-deploy-image:v2.135.0
  variables:
    KUBE_INGRESS_BASE_DOMAIN: app.varteq.dev
  environment:
    name: staging
    url: http://typlix-typlx-website.app.varteq.dev
  script:
    - auto-deploy check_kube_domain
    - auto-deploy download_chart
    - auto-deploy use_kube_context || true
    - auto-deploy ensure_namespace
    - auto-deploy initialize_tiller
    - auto-deploy create_secret
    - auto-deploy deploy
    - auto-deploy delete canary
    - auto-deploy persist_environment_url
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
